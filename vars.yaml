version: 1
kind: vars
variables:
  PROJECT_ROOT: ${PROJECT_ROOT}
  DATA_ROOT: ${DATA_ROOT}
  POSTGRES_DSN: ${POSTGRES_DSN}
  START_DATE: ${START_DATE}
  END_DATE: ${END_DATE}
  SEASON_START: ${SEASON_START}
  SEASON_END: ${SEASON_END}
  PYTHON_BIN: ${PYTHON_BIN:-python}
  GIT_BIN: ${GIT_BIN:-git}
  CURL_BIN: ${CURL_BIN:-curl}
  UNZIP_BIN: ${UNZIP_BIN:-unzip}
  REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
  RETRY_COUNT: ${RETRY_COUNT:-3}
  RETRY_BACKOFF_SECONDS: ${RETRY_BACKOFF_SECONDS:-10}
  CHUNK_DAYS_STATCAST: ${CHUNK_DAYS_STATCAST:-5}
  MLB_STATSAPI_BASE_URL: ${MLB_STATSAPI_BASE_URL}
paths:
  raw_download_root: ${DATA_ROOT}/downloads
  bronze_root: ${DATA_ROOT}/bronze
  temp_root: ${DATA_ROOT}/tmp
