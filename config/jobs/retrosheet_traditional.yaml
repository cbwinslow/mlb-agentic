version: 1
kind: job
id: retrosheet_traditional
source: retrosheet
summary: Download Retrosheet traditional event archives and ingest to bronze.
variables:
  download_dir: ${DATA_ROOT}/downloads/retrosheet/traditional
  extract_dir: ${DATA_ROOT}/bronze/retrosheet/traditional/raw
  bronze_schema: bronze_retrosheet
  bronze_table: events_raw
steps:
  - id: ensure_directories
    action: ensure_directories
    args:
      paths:
        - ${DATA_ROOT}/downloads/retrosheet/traditional
        - ${DATA_ROOT}/bronze/retrosheet/traditional/raw

  - id: download_archives
    action: retrosheet_download_traditional
    args:
      download_dir: ${DATA_ROOT}/downloads/retrosheet/traditional

  - id: extract_archives
    action: retrosheet_extract_traditional
    args:
      download_dir: ${DATA_ROOT}/downloads/retrosheet/traditional
      extract_dir: ${DATA_ROOT}/bronze/retrosheet/traditional/raw

  - id: ingest_to_bronze
    action: ingest_directory_to_bronze
    args:
      directory: ${DATA_ROOT}/bronze/retrosheet/traditional/raw
      schema_name: bronze_retrosheet
      table_name: events_raw
      source: retrosheet_traditional
      file_pattern: "*.csv"
      postgres_dsn: ${POSTGRES_DSN}
